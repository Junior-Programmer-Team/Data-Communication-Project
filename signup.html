git <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Brown & Cream</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="card">
    <div class="photo photo-signup"></div>
    <div class="form-panel">
      <h1>Sign Up</h1>
      <p class="subtitle">First create your account.</p>

      <div class="field-row">
        <span class="icon"><i data-lucide="user"></i></span>
        <div class="field-wrap">
          <label>Username</label>
          <input type="text">
        </div>
      </div>

      <div class="field-row">
        <span class="icon"><i data-lucide="lock"></i></span>
        <div class="field-wrap">
          <label>Password</label>
          <input type="password">
        </div>
      </div>

      <div class="btn-row">
        <a href="welcome.html" class="btn btn-outline">Back</a>
        <a href="loading.html" class="btn btn-dark">Done</a>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
