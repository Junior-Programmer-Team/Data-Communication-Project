<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>Welcome</title>
</head>

<body>

    <div class="Login-Part">
        <aside>
            <img src="Picture/PicForWelcome.png" alt="Welcome-Picture">
        </aside>

        <main class="Content">
            <h1>Welcome</h5>
            <p>Enter your username and password</p>

            <form class="Form-part">
                <div class="Input-Data-part">
                    <img class="icon" src="/Picture/Icon-User.png" alt="icon-user">
                    <div class="Type-Part">
                        <p>Username</p>
                        <input id="WelcomeF-Username" type="text">
                    </div>
                </div>

                <div class="Input-Data-part">
                    <img class="icon" src="/Picture/Icon-Password.png" alt="icon-password">
                    <div class="Type-Part">
                        <p>Password</p>
                        <input type="password">
                    </div>
                </div>

                <div class="button-Part">
                    <button type="button" class="btnLeft">Sign Up</button>
                    <button type="submit" class="btnRight">Log In</button>
                </div>
            </form>
        </main>

    </div>

    <script src="Script.js"></script>
</body>


</html>
