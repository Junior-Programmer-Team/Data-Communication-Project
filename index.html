<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Brown & Cream</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="card">
    <div class="photo photo-welcome"></div>
    <div class="form-panel">
      <h1>Welcome</h1>
      <p class="subtitle">Enter your username and password</p>

      <div class="field-row">
        <span class="icon"><i data-lucide="user"></i></span>
        <div class="field-wrap">
          <label>Username</label>
          <input type="text">
        </div>
      </div>

      <div class="field-row">
        <span class="icon"><i data-lucide="lock"></i></span>
        <div class="field-wrap">
          <label>Password</label>
          <input type="password">
        </div>
      </div>

      <div class="btn-row">
        <a href="signup.html" class="btn btn-dark">Sign up</a>
        <a href="loading.html" class="btn btn-outline">Log in</a>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
