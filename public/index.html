<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Data Communication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Chat-Room</h1>
    </header>

    <div class="chat-room">     
        <p id="date-time">Date Area</p>

        <div id="chat-history" class="chat-history">
            
            <div class="other-chat">
                <img class="icon" src="Picture/Icon-User.png" alt="icon-user">
                <div class="other-message">
                    <p class="other-bubble">สวัสดี! มีอะไรให้ฉันช่วยไหม?</p>
                    <p class="time">09:00</p>
                </div>
            </div>

        </div>

        <div class="input-part">
            <button class="sending" id="btn-sendfile">
                <img id="icon-sendfile" src="Picture/Icon-sendfile.png" alt="send-file-icon">
            </button>
            <input id="type-msg" type="text" placeholder="พิมพ์ข้อความที่นี่...">
            <button class="sending" id="btn-sendchat">
                <img id="icon-sendchat" src="Picture/Icon-SendMessage.png" alt="icon-sendmessage">
            </button>
        </div>
    </div>

    <!-- <div id="ChatBox"></div>
    <div style="display: flex; flex-direction: row;">
        <input type="text" id="Message">

        <button type="submit" id="Submit_button" onclick="SendMessage()">Submit</button>
    </div> -->

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
