<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Data Communication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Chat-Room</h1>
    </header>

    <div id="enter-name-container">
        <h2>Enter Your Name</h2>
        <input id="enter-name-input" type="text" placeholder="Your name...">
        <button id="enter-name-submit-btn">Ok</button>
    </div>

    <div class="chat-room">     
        <p id="date-time"></p>

        <div id="chat-history"></div>

        <div class="input-part">
            <button class="sending" id="btn-sendfile">
                <img id="icon-sendfile" src="Picture/Icon-sendfile.png" alt="send-file-icon">
            </button>
            <input id="type-msg" type="text" placeholder="พิมพ์ข้อความที่นี่...">
            <button class="sending" id="btn-sendchat">
                <img id="icon-sendchat" src="Picture/Icon-SendMessage.png" alt="icon-sendmessage">
            </button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
